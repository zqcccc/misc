<svg viewBox="0 0 680 492" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TRHRP 端到端数据流</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#1a1a1a">TRHRP 策略：端到端数据流</text>

  <rect x="40" y="56" width="600" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <circle cx="74" cy="84" r="15" fill="#185FA5"/>
  <text x="74" y="84" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">1</text>
  <text x="104" y="78" font-size="14" font-weight="500" fill="#0C447C">输入：6 个市场标的（UNIVERSE）</text>
  <text x="104" y="98" font-size="12" fill="#185FA5">沪深300 · 中证500 · 恒生指数 · 恒生科技 · SPY · QQQ</text>

  <line x1="340" y1="112" x2="340" y2="128" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="128" width="600" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <circle cx="74" cy="156" r="15" fill="#185FA5"/>
  <text x="74" y="156" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">2</text>
  <text x="104" y="150" font-size="14" font-weight="500" fill="#0C447C">数据拉取 download_ohlc</text>
  <text x="104" y="170" font-size="12" fill="#185FA5">yfinance 下载 OHLC + 本地缓存 + 重试退避（解决限频空返回）</text>

  <line x1="340" y1="184" x2="340" y2="200" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="200" width="600" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <circle cx="74" cy="228" r="15" fill="#185FA5"/>
  <text x="74" y="228" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">3</text>
  <text x="104" y="222" font-size="14" font-weight="500" fill="#0C447C">信号计算 build_signal_frame</text>
  <text x="104" y="242" font-size="12" fill="#185FA5">21d 动量(mom) + 21d 年化已实现波动率(vol) + 252d z-score</text>

  <line x1="340" y1="256" x2="340" y2="272" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="272" width="600" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="74" cy="300" r="15" fill="#534AB7"/>
  <text x="74" y="300" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">4</text>
  <text x="104" y="294" font-size="14" font-weight="500" fill="#3C3489">状态分类 Regime（三档判定）</text>
  <text x="104" y="314" font-size="12" fill="#534AB7">risk_on / moderate / risk_off</text>

  <line x1="340" y1="328" x2="340" y2="344" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="344" width="600" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="74" cy="372" r="15" fill="#534AB7"/>
  <text x="74" y="372" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">5</text>
  <text x="104" y="366" font-size="14" font-weight="500" fill="#3C3489">仓位配比 + 叠加 overlay</text>
  <text x="104" y="386" font-size="12" fill="#534AB7">基础配比表 + z-score 均值回归微调（±delta 百分点）</text>

  <line x1="340" y1="400" x2="340" y2="416" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="416" width="600" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="74" cy="444" r="15" fill="#534AB7"/>
  <text x="74" y="444" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fff">6</text>
  <text x="104" y="438" font-size="14" font-weight="500" fill="#3C3489">输出 snapshot → state.json</text>
  <text x="104" y="458" font-size="12" fill="#534AB7">monitor status 展示 / regime 变更时发 Telegram 通知</text>
</svg>