<svg viewBox="0 0 680 570" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Regime 判定决策树</title>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="500" fill="#1a1a1a">Regime 判定决策树</text>

  <rect x="210" y="44" width="260" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="66" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">输入：vol(21d 年化) 与 mom(21d)</text>

  <polygon points="340,104 460,150 340,196 220,150" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="145" text-anchor="middle" dominant-baseline="central" font-size="12.5" font-weight="500" fill="#633806">vol &gt; 30%</text>
  <text x="340" y="162" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">(crash_trigger)?</text>

  <polygon points="340,244 480,290 340,336 200,290" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="338" y="285" text-anchor="middle" dominant-baseline="central" font-size="12.5" font-weight="500" fill="#633806">vol &gt; p60</text>
  <text x="338" y="302" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">且 mom &lt; 0?</text>

  <polygon points="340,384 490,430 340,476 190,430" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="338" y="424" text-anchor="middle" dominant-baseline="central" font-size="12.5" font-weight="500" fill="#633806">vol ≤ 中位(126d)</text>
  <text x="338" y="441" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">且 mom &gt; 0?</text>

  <rect x="500" y="126" width="160" height="48" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="580" y="146" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="500" fill="#501313">risk_off</text>
  <text x="580" y="164" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">防御：股票 20%</text>

  <rect x="500" y="406" width="160" height="48" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="580" y="426" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="500" fill="#27500A">risk_on</text>
  <text x="580" y="444" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">进攻：股票 80%</text>

  <rect x="500" y="500" width="160" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="580" y="520" text-anchor="middle" dominant-baseline="central" font-size="13.5" font-weight="500" fill="#633806">moderate</text>
  <text x="580" y="538" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">中性：股票 50%</text>

  <line x1="340" y1="88" x2="340" y2="102" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="460" y1="150" x2="498" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="340" y1="196" x2="340" y2="242" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <polyline points="480,290 512,290 512,150 498,150" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="340" y1="336" x2="340" y2="382" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="490" y1="430" x2="498" y2="430" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <polyline points="340,476 340,524 498,524" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
</svg>