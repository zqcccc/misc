name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

jobs:

  # 1) 算版本号(一次), 输出给两个 build job 共用
  version:
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.version.outputs.next_version }}
    steps:
    - uses: zqcccc/docker-image-version@0.2
      id: version
      with:
        repository: 172232502/misc

  # 2) misc 镜像(Next 页面+API) —— 与 trhrp-data 并行
  build-misc:
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Build and push misc image
      uses: docker/build-push-action@v4
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: 172232502/misc:latest,172232502/misc:${{ needs.version.outputs.next_version }}
        labels: 172232502/misc:${{ needs.version.outputs.next_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 3) trhrp-data 数据容器 —— 与 misc 并行
  build-trhrp-data:
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Build and push trhrp-data image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/trhrp-data/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: 172232502/trhrp-data:latest,172232502/trhrp-data:${{ needs.version.outputs.next_version }}
        labels: 172232502/trhrp-data:${{ needs.version.outputs.next_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 4) 仅当两个 build 都成功后, 才打 webhook
  notify:
    needs: [build-misc, build-trhrp-data]
    if: success()
    runs-on: ubuntu-latest
    steps:
    - name: Notify webhook to deploy
      run: |
        curl -X POST ${{ secrets.MY_WEBHOOK_URL }} \
            -H "X-Hook-Token: ${{ secrets.MY_WEBHOOK_TOKEN }}"
